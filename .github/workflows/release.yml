name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build Chrome & Firefox
        run: npm run build:all

      - name: Zip build artifacts
        run: |
          cd build/chrome && zip -r ../../shinkansen-chrome-${{ steps.version.outputs.VERSION }}.zip . && cd ../..
          cd build/firefox && zip -r ../../shinkansen-firefox-${{ steps.version.outputs.VERSION }}.zip . && cd ../..
          cp shinkansen-chrome-${{ steps.version.outputs.VERSION }}.zip shinkansen-${{ steps.version.outputs.VERSION }}.zip
          cp shinkansen-chrome-${{ steps.version.outputs.VERSION }}.zip shinkansen.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          files: |
            shinkansen-chrome-${{ steps.version.outputs.VERSION }}.zip
            shinkansen-firefox-${{ steps.version.outputs.VERSION }}.zip
            shinkansen-${{ steps.version.outputs.VERSION }}.zip
            shinkansen.zip
          generate_release_notes: true
          make_latest: "legacy"
