<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Innertube fetch fixture (v1.3.9)</title>
</head>
<body>
  <!-- 模擬 YouTube 頁面：<script> 內嵌 ytInitialPlayerResponse（含 captionTracks） -->
  <!-- videoId = "testABC1234" -->
  <script>
    var ytInitialPlayerResponse = {
      "videoDetails": { "videoId": "testABC1234", "title": "Test Video" },
      "captions": {
        "playerCaptionsTracklistRenderer": {
          "captionTracks": [
            {
              "baseUrl": "/mock-captions-en.json",
              "languageCode": "en",
              "name": { "simpleText": "English" },
              "isTranslatable": true
            },
            {
              "baseUrl": "/mock-captions-zh.json",
              "languageCode": "zh-Hant",
              "name": { "simpleText": "繁體中文" },
              "isTranslatable": false
            },
            {
              "baseUrl": "/mock-captions-en-asr.json",
              "languageCode": "en",
              "kind": "asr",
              "name": { "simpleText": "English (auto-generated)" },
              "isTranslatable": true
            }
          ]
        }
      }
    };
  </script>

  <div class="html5-video-player">
    <div class="ytp-caption-window-container"></div>
    <video></video>
  </div>
</body>
</html>
