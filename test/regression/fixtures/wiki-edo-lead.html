<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: wiki-edo-lead-slot-dup</title>
</head>
<body>
  <!--
    合成 fixture (非真實 Wikipedia 抓取),結構模仿 Wikipedia 條目 lead
    paragraph 的「多個 <a> + <b> + <sup class="reference">」常見組合,
    用來測試 v0.57 修的 slot dup graceful degradation。

    結構特徵 (重要,不要動):
      - <p> 包含多個 preservable inline 元素
      - <b> = slot 0  (Edo)
      - <a> = slot 1  (Japanese)
      - <sup class="reference"> = slot 2  (atomic preserve, ⟦*2⟧)
      - <a> = slot 3  (Yedo)
      - <a> = slot 4  (former name)   ← dup 目標
      - <a> = slot 5  (Tokyo)
      - <a> = slot 6  (Japan)
      - <a> = slot 7  (Tokugawa shogunate)
      共 7 個 paired slots + 1 atomic = 8 slots,6 個 paired <a> + 1 個
      atomic 內含的 <a> = 注入後 <p> 底下應該有 7 個 <a>。

    對應的 canned LLM 回應 (見 wiki-edo-lead.response.txt) 故意把 slot 4
    用兩次,模擬 v0.57 真實踩到的情境:LLM 把「former name of Tokyo」這個
    語意拆成中文兩處(「現今日本首都」+「舊稱」),都借用 slot 4 的 <a> shell。

    v0.52 之前的 bug 政策:任何 dup → 整段譯文丟掉走 plainTextFallback →
    <p> 被 clean-slate → 全部 7 個 <a> 連結消失。
    v0.57 的 graceful policy:dup 偵測後選 first 非空 occurrence 當 winner
    (保留 <a> shell),其他 occurrence 降級為純文字 → 7 個 <a> 中只失去
    1 個 (loser),其他 6 個 + atomic 內 1 個 = 6 個 paired shell 全部正確
    就位,加上 atomic 內 1 個總共 7 個 <a>。
  -->
  <p id="target"><b>Edo</b> (<a href="https://example.com/ja">Japanese</a>: 江戸<sup class="reference"><a href="https://example.com/cite-1">[1]</a></sup>, "bay-entrance"), also called <a href="https://example.com/yedo">Yedo</a>, is the <a href="https://example.com/former-name">former name</a> of <a href="https://example.com/tokyo">Tokyo</a>, capital of <a href="https://example.com/japan">Japan</a>. It was the seat of the <a href="https://example.com/tokugawa">Tokugawa shogunate</a>.</p>
</body>
</html>
