<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>fixture: li-strong-br</title>
</head>
<body>
  <!--
    對應 v1.4.4 修的「<li><strong>標題</strong><br>內文</li> 翻譯後 <br> 消失」bug。

    結構特徵:
      <li>
        <strong>タイトル行</strong>   ← preservable inline → slot ⟦0⟧
        <br>                          ← <br> → \u0001 → \n (送給 Gemini)
        \n本文テキスト                 ← text node（來源 HTML 換行）
      </li>

    Bug 根因（v1.4.3 以前）:
      collapseCjkSpacesAroundPlaceholders 的第 2 條 pattern
        (C + ⟦/N⟧)\s+(C)  ← \s+ 包含 \n!
      在 ⟦/0⟧\n漢字 上命中，把 \n 吃掉。
      parseSegment 就看不到 \n，無法建出 <br> 元素，導致標題與內文擠在一起。

    v1.4.4 修法:
      將 \s+ 改為 [ \t]+（只移除空格/tab，不動 \n），
      讓 \n 能活到 parseSegment 的 pushText，正確建出 <br>。

    SANITY 紀錄（已驗證）：把 collapseCjkSpacesAroundPlaceholders 的第 2 條 pattern
      改回 \s+，brCount 從 1 降為 0，test fail。還原後 pass。
  -->
  <ul>
    <li id="target">
      <strong>より長い距離を歩ける</strong><br>
      体への負担が減ることでより長時間行動できるようになり、歩く速度も増すので、1日により長い距離を歩けるようになります。
    </li>
  </ul>
</body>
</html>
