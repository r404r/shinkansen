<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Shinkansen</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>🚄 Shinkansen</h1>
    <span class="version" id="version"></span>
  </header>

  <main>
    <button id="translate-btn" class="primary" data-i18n="popup_translate">翻譯本頁</button>
    <button id="edit-btn" class="secondary" hidden data-i18n="popup_edit">編輯譯文</button>

    <!-- v1.5.0: 顯示模式切換（單語覆蓋 / 雙語對照） -->
    <div class="display-mode-row">
      <span class="display-mode-label" data-i18n="popup_display_mode">顯示模式</span>
      <div class="display-mode-toggle" role="radiogroup" aria-label="顯示模式">
        <button id="mode-single" class="mode-btn" type="button" role="radio" aria-checked="true" data-i18n="popup_mode_single">單語覆蓋</button>
        <button id="mode-dual"   class="mode-btn" type="button" role="radio" aria-checked="false" data-i18n="popup_mode_dual">雙語對照</button>
      </div>
    </div>

    <div class="row">
      <label for="auto" data-i18n="popup_auto_translate">自動翻譯指定網站</label>
      <input type="checkbox" id="auto">
    </div>

    <!-- v1.2.12: 只在 YouTube 頁面時顯示 -->
    <div class="row" id="yt-subtitle-row" hidden>
      <label for="yt-subtitle-toggle" data-i18n="popup_yt_subtitle">YouTube 字幕���譯</label>
      <input type="checkbox" id="yt-subtitle-toggle">
    </div>

    <div class="row">
      <label for="glossary-toggle" data-i18n="popup_glossary">術語表一致化</label>
      <input type="checkbox" id="glossary-toggle">
    </div>

    <div class="cache-row">
      <span id="cache-info" class="cache-info" data-i18n="popup_cache_loading">快取��讀取中…</span>
      <button id="clear-cache-btn" class="link small" data-i18n="popup_clear_cache">清除快取</button>
    </div>

    <div class="cache-row">
      <span id="usage-info" class="cache-info" data-i18n="popup_cost_loading">累計費用：讀取中…</span>
    </div>

    <div id="status" class="status" data-i18n="popup_status_ready">���態：就緒</div>
  </main>

  <footer>
    <button id="options-btn" class="link" data-i18n="popup_settings">設定</button>
    <span id="shortcut-hint" class="hint"></span>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
